<!DOCTYPE html>
<html>
<head>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTHM Re-Trade - Contact Seller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h2>UTHM Re-Trade</h2>
        </div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="most-wanted.html">Most Wanted</a>
            <a href="aboutus.html">About Us</a>
        </nav>
    </header>

    <main class="category-container">
        <h2 class="section-title">Message the Seller</h2>
        <p>Fill out this form to get in touch with the student seller. Remember to arrange your meeting safely on campus! </p>

        <div class="info-section" style="max-width: 600px; margin: 0 auto;">
            <form action="browse.html" method="get">
                
                <p>
                    <label style="font-weight: bold; color: #0F2042;">Item You Want to Buy:</label><br>
                    <input type="text" placeholder="Enter Item" required 
                           style="width: 100%; padding: 10px; margin-top: 5px; background-color: #eee; border: 1px solid #ccc; border-radius: 4px;">
                </p>

                <p style="margin-top: 15px;">
                    <label style="font-weight: bold; color: #0F2042;">Your Full Name:</label><br>
                    <input type="text" placeholder="Enter your name" required 
                           style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px;">
                </p>

                <p style="margin-top: 15px;">
                    <label style="font-weight: bold; color: #0F2042;">Your UTHM Matric Number:</label><br>
                    <input type="text" placeholder="e.g., AI250000" required 
                           style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px;">
                </p>

                <p style="margin-top: 15px;">
                    <label style="font-weight: bold; color: #0F2042;">Your Message to Seller:</label><br>
                    <textarea rows="5" placeholder="Hi! Is this item still available? Can we meet at the library tomorrow?" required 
                              style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; font-family: Arial, sans-serif;"></textarea>
                </p>

                <p style="margin-top: 20px; text-align: center;">
                    <button type="submit" class="search-box button" style="width: 100%; padding: 12px; font-size: 16px;">
                        Send Message 🚀
                    </button>
                </p>
                
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 UTHM Re-Trade Project</p>
    </footer>

</body>
</html>
